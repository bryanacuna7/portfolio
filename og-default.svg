<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1c1c1f" stroke-width="1">
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="460" x2="1200" y2="460"/>
  </g>
  <line x1="0" y1="170" x2="280" y2="170" stroke="url(#accent)" stroke-width="2"/>

  <!-- Monogram badge -->
  <g transform="translate(80, 100)">
    <rect width="60" height="60" rx="14" fill="#0a0a0a"/>
    <rect x="1" y="1" width="58" height="58" rx="13" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="30" y="40" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="24" font-weight="700"
          fill="#10b981" letter-spacing="-1">BA</text>
  </g>

  <text x="160" y="142"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="22" font-weight="500"
        fill="#a3a3a3" letter-spacing="0.5">
    BRYAN ACUÑA
  </text>

  <!-- Headline -->
  <text x="80" y="280"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="84" font-weight="700"
        fill="#ffffff" letter-spacing="-2">
    Data analyst &amp;
  </text>
  <text x="80" y="380"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="84" font-weight="700"
        fill="#10b981" letter-spacing="-2">
    SaaS builder.
  </text>

  <!-- Subline -->
  <text x="80" y="510"
        font-family="-apple-system, system-ui, sans-serif"
        font-size="26" font-weight="400"
        fill="#a3a3a3">
    9 years in fintech. Analyzes the data, builds the tools, ships the product.
  </text>

  <!-- Tag -->
  <text x="80" y="560"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="20" font-weight="500"
        fill="#6c6c70" letter-spacing="1.5">
    BRYANACUNA7.GITHUB.IO/PORTFOLIO
  </text>
</svg>
